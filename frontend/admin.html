<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prairie Pumping — Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #7d8590;
      --accent: #8CC63F;
      --red: #f85149;
      --yellow: #d29922;
      --radius: 10px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* Login */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-box {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }
    .login-box h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    .login-box p {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 24px;
    }
    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 16px;
      padding: 11px 14px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.15s;
    }
    input[type="password"]:focus { border-color: var(--accent); }
    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      padding: 12px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.9; }
    .err { color: var(--red); font-size: 13px; margin-top: 8px; display: none; }

    /* Admin panel */
    .admin-wrap { display: none; }
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.05em; }
    .topbar span { color: var(--muted); font-size: 13px; }
    .logout-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      font-size: 13px;
      padding: 6px 12px;
      cursor: pointer;
    }
    .logout-btn:hover { color: var(--text); border-color: var(--text); }

    .main { padding: 24px; max-width: 900px; margin: 0 auto; }

    /* Filter tabs */
    .filter-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .filter-tab {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      font-size: 13px;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-tab.active, .filter-tab:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(140,198,63,0.07);
    }

    /* Request cards */
    .request-list { display: flex; flex-direction: column; gap: 12px; }
    .request-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
    }
    .request-card.status-confirmed { border-left: 3px solid var(--accent); }
    .request-card.status-cancelled { opacity: 0.5; }
    .request-card.status-pending { border-left: 3px solid var(--yellow); }

    .request-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }
    .tag {
      font-size: 12px;
      border-radius: 5px;
      padding: 3px 10px;
      font-weight: 600;
    }
    .tag-date { background: rgba(255,255,255,0.07); color: var(--text); }
    .tag-yards { background: rgba(140,198,63,0.15); color: var(--accent); }
    .tag-pending { background: rgba(210,153,34,0.15); color: var(--yellow); }
    .tag-confirmed { background: rgba(140,198,63,0.15); color: var(--accent); }
    .tag-cancelled { background: rgba(248,81,73,0.12); color: var(--red); }
    .tag-estimate { background: rgba(255,255,255,0.05); color: var(--muted); }

    .request-details {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
    }
    .request-details strong { color: var(--text); }

    .request-actions { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
    .btn-confirm {
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      padding: 8px 16px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-cancel {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      font-size: 13px;
      padding: 7px 16px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-cancel:hover { border-color: var(--red); color: var(--red); }
    .btn-confirm:hover { opacity: 0.85; }

    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--muted);
    }
    .empty-state p { font-size: 15px; margin-top: 8px; }

    .loading { text-align: center; padding: 48px; color: var(--muted); }

    @media (max-width: 540px) {
      .request-card { grid-template-columns: 1fr; }
      .request-actions { flex-direction: row; align-items: center; }
    }
  </style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <h1>PRAIRIE PUMPING</h1>
    <p>Pour Request Admin</p>
    <input type="password" id="secretInput" placeholder="Admin password" onkeydown="if(event.key==='Enter')login()">
    <button class="btn-primary" onclick="login()">Sign In</button>
    <div class="err" id="loginErr">Wrong password.</div>
  </div>
</div>

<!-- Admin Panel -->
<div class="admin-wrap" id="adminWrap">
  <div class="topbar">
    <div>
      <h1>PRAIRIE PUMPING</h1>
      <span>Pour Requests</span>
    </div>
    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </div>

  <div class="main">
    <div class="filter-tabs">
      <div class="filter-tab active" onclick="setFilter('all', this)">All</div>
      <div class="filter-tab" onclick="setFilter('pending', this)">Pending</div>
      <div class="filter-tab" onclick="setFilter('confirmed', this)">Confirmed</div>
      <div class="filter-tab" onclick="setFilter('cancelled', this)">Cancelled</div>
    </div>

    <div id="requestList" class="loading">Loading...</div>
  </div>
</div>

<script>
  const API = window.location.origin;
  let secret = '';
  let allRequests = [];
  let currentFilter = 'all';

  function login() {
    secret = document.getElementById('secretInput').value;
    loadRequests();
  }

  async function loadRequests() {
    try {
      const res = await fetch(`${API}/api/pour-request`, {
        headers: { 'x-admin-secret': secret }
      });
      if (res.status === 401) {
        document.getElementById('loginErr').style.display = 'block';
        return;
      }
      if (!res.ok) throw new Error('Server error');

      allRequests = await res.json();
      document.getElementById('loginWrap').style.display = 'none';
      document.getElementById('adminWrap').style.display = 'block';
      renderRequests();
    } catch (e) {
      document.getElementById('loginErr').textContent = 'Connection error. Try again.';
      document.getElementById('loginErr').style.display = 'block';
    }
  }

  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderRequests();
  }

  function renderRequests() {
    const filtered = currentFilter === 'all'
      ? allRequests
      : allRequests.filter(r => r.status === currentFilter);

    const el = document.getElementById('requestList');
    el.className = 'request-list';

    if (filtered.length === 0) {
      el.innerHTML = `<div class="empty-state">
        <div style="font-size:32px;">📋</div>
        <p>${currentFilter === 'all' ? 'No pour requests yet.' : `No ${currentFilter} requests.`}</p>
      </div>`;
      return;
    }

    el.innerHTML = filtered.map(r => {
      const dt = new Date(r.job_date + 'T' + r.job_time);
      const dateStr = dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
      const timeStr = dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      const hrs = Math.max(1, Math.round((r.yards / 60) * 10) / 10);
      const estStr = hrs === 1 ? '~1 hr' : `~${hrs} hrs`;

      const statusTag = `<span class="tag tag-${r.status}">${r.status.toUpperCase()}</span>`;

      const details = [
        r.address ? `<div><strong>Location:</strong> ${esc(r.address)}</div>` : '',
        r.client_name ? `<div><strong>Name:</strong> ${esc(r.client_name)}</div>` : '',
        r.client_phone ? `<div><strong>Phone:</strong> <a href="tel:${esc(r.client_phone)}" style="color:var(--accent);text-decoration:none;">${esc(r.client_phone)}</a></div>` : '',
        r.client_email ? `<div><strong>Email:</strong> ${esc(r.client_email)}</div>` : '',
        r.notes ? `<div><strong>Notes:</strong> ${esc(r.notes)}</div>` : '',
        `<div style="margin-top:6px;font-size:12px;">Submitted ${new Date(r.created_at).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' })}</div>`
      ].filter(Boolean).join('');

      const actions = r.status === 'pending'
        ? `<button class="btn-confirm" onclick="updateStatus(${r.id}, 'confirmed')">✓ Confirm</button>
           <button class="btn-cancel" onclick="updateStatus(${r.id}, 'cancelled')">Cancel</button>`
        : r.status === 'confirmed'
        ? `<button class="btn-cancel" onclick="updateStatus(${r.id}, 'cancelled')">Cancel</button>`
        : '';

      return `
        <div class="request-card status-${r.status}" id="card-${r.id}">
          <div>
            <div class="request-meta">
              <span class="tag tag-date">📅 ${dateStr} @ ${timeStr}</span>
              <span class="tag tag-yards">⚡ ${r.yards} yds</span>
              <span class="tag tag-estimate">⏱ ${estStr}</span>
              ${statusTag}
            </div>
            <div class="request-details">${details || '<span>No additional details provided.</span>'}</div>
          </div>
          <div class="request-actions">${actions}</div>
        </div>`;
    }).join('');
  }

  async function updateStatus(id, status) {
    try {
      const res = await fetch(`${API}/api/pour-request/${id}`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'x-admin-secret': secret
        },
        body: JSON.stringify({ status })
      });
      if (!res.ok) throw new Error();
      const updated = await res.json();
      const idx = allRequests.findIndex(r => r.id === id);
      if (idx !== -1) allRequests[idx] = updated;
      renderRequests();
    } catch (e) {
      alert('Failed to update. Try refreshing.');
    }
  }

  function logout() {
    secret = '';
    allRequests = [];
    document.getElementById('adminWrap').style.display = 'none';
    document.getElementById('loginWrap').style.display = 'flex';
    document.getElementById('secretInput').value = '';
    document.getElementById('loginErr').style.display = 'none';
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
